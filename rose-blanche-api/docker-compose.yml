services:
  # ── PostgreSQL with pgvector extension ──
  postgres:
    image: pgvector/pgvector:pg17
    container_name: rose-blanche-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: rose_blanche
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rose_blanche"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── RabbitMQ message broker ──
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rose-blanche-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5

  # ── FastAPI backend ──
  api:
    build:
      context: ..
      dockerfile: rose-blanche-api/Dockerfile
    container_name: rose-blanche-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment: &app-env
      - APP_NAME=Rose-Blanche-RAG
      - APP_VERSION=1.0.0
      - POSTGRES_USERNAME=postgres
      - POSTGRES_PASSWORD=admin
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_MAIN_DATABASE=rose_blanche
      - EMBEDDING_MODEL_ID=all-MiniLM-L6-v2
      - EMBEDDING_MODEL_SIZE=384
      - VECTOR_DB_DISTANCE_METHOD=cosine
      - DEFAULT_CHUNK_SIZE=500
      - DEFAULT_OVERLAP_SIZE=50
      - DEFAULT_TOP_K=3
      - DATASET_DIR=/app/dataset
      - AUTO_INGEST=true
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
      - CELERY_RESULT_BACKEND=rpc://
    volumes:
      - model-cache:/root/.cache
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ── Celery Worker ──
  celery-worker:
    build:
      context: ..
      dockerfile: rose-blanche-api/Dockerfile
    container_name: rose-blanche-celery-worker
    restart: unless-stopped
    command: celery -A celery_app worker --loglevel=info --concurrency=2
    environment: *app-env
    volumes:
      - model-cache:/root/.cache
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ── Celery Beat (scheduler) ──
  celery-beat:
    build:
      context: ..
      dockerfile: rose-blanche-api/Dockerfile
    container_name: rose-blanche-celery-beat
    restart: unless-stopped
    command: celery -A celery_app beat --loglevel=info
    environment: *app-env
    depends_on:
      rabbitmq:
        condition: service_healthy

  # ── Flower (Celery monitoring) ──
  flower:
    build:
      context: ..
      dockerfile: rose-blanche-api/Dockerfile
    container_name: rose-blanche-flower
    restart: unless-stopped
    command: celery -A celery_app flower --port=5555 --broker_api=http://guest:guest@rabbitmq:15672/api/
    ports:
      - "5555:5555"
    environment: *app-env
    depends_on:
      rabbitmq:
        condition: service_healthy

  # ── Prometheus (metrics collection) ──
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: rose-blanche-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    depends_on:
      - api

  # ── Grafana (metrics visualization & dashboards) ──
  grafana:
    image: grafana/grafana:11.1.0
    container_name: rose-blanche-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=roseblanche
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/rose-blanche-dashboard.json
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  pgdata:
  model-cache:
  rabbitmq-data:
  prometheus-data:
  grafana-data:
